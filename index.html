<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Pixel<span>Forge</span></div>
  <div class="menu-bar">
    <button class="menu-btn" onclick="openNewModal()">New</button>
    <button class="menu-btn" onclick="triggerImportPNG()">Import PNG</button>
    <button class="menu-btn" onclick="triggerImportSVG()">Import SVG</button>
    <button class="menu-btn" onclick="exportPNG()">Export PNG</button>
    <button class="menu-btn" onclick="exportSVG()">Export SVG</button>
    <button class="menu-btn" onclick="openPaletteImport()">Palette</button>
    <button class="menu-btn" onclick="saveProject()">Save</button>
    <button class="menu-btn" onclick="triggerLoadProject()">Load</button>
  </div>
  <div class="header-right">
    <div class="canvas-size-display" id="size-display">32 × 32</div>
    <div class="zoom-ctrl">
      <button onclick="zoomOut()">−</button>
      <span class="zoom-label" id="zoom-label">8×</span>
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomFit()" title="Fit" class="zoom-fit">Fit</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="pencil" onclick="setTool('pencil')">
        ✏️<span class="tip">Pencil (P)</span>
      </button>
      <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')">
        🧹<span class="tip">Eraser (E)</span>
      </button>
      <button class="tool-btn" data-tool="fill" onclick="setTool('fill')">
        🪣<span class="tip">Fill (F)</span>
      </button>
      <button class="tool-btn" data-tool="eyedropper" onclick="setTool('eyedropper')">
        💉<span class="tip">Eyedropper (I)</span>
      </button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <button class="tool-btn" data-tool="line" onclick="setTool('line')">
        ╱<span class="tip">Line (L)</span>
      </button>
      <button class="tool-btn" data-tool="rect" onclick="setTool('rect')">
        ▭<span class="tip">Rectangle (R)</span>
      </button>
      <button class="tool-btn" data-tool="ellipse" onclick="setTool('ellipse')">
        ◯<span class="tip">Ellipse (O)</span>
      </button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <button class="tool-btn" data-tool="select" onclick="setTool('select')">
        ⬚<span class="tip">Select (S)</span>
      </button>
      <button class="tool-btn" data-tool="move" onclick="setTool('move')">
        ✥<span class="tip">Move (V)</span>
      </button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <button class="tool-btn" onclick="flipH()">↔<span class="tip">Flip H</span></button>
      <button class="tool-btn" onclick="flipV()">↕<span class="tip">Flip V</span></button>
      <button class="tool-btn" onclick="rotate90()">↻<span class="tip">Rotate 90°</span></button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group">
      <button class="tool-btn" onclick="undo()">↩<span class="tip">Undo (Ctrl+Z)</span></button>
      <button class="tool-btn" onclick="redo()">↪<span class="tip">Redo (Ctrl+Y)</span></button>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvas-area">
    <div id="canvas-wrap">
      <div id="checker-bg"></div>
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="brush-cursor"></div>
    </div>
    <!-- Reference image: floating, draggable, resizable -->
    <div id="ref-float" class="ref-float">
      <div id="ref-float-bar" class="ref-float-bar">
        <span class="ref-float-label">📌 REF</span>
        <span id="ref-float-name" class="ref-float-name"></span>
        <button onclick="clearRef()" class="ref-float-close" title="Remove">✕</button>
      </div>
      <div id="ref-img-wrap" class="ref-img-wrap">
        <img id="ref-img-float" class="ref-img">
        <div id="ref-resize" class="ref-resize-handle"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Colors -->
    <div class="panel-section">
      <div class="panel-title">Colors</div>
      <div class="color-swatches">
        <div class="swatch-wrap">
          <div class="color-swatch" id="fg-swatch" onclick="openColorPicker('fg')" title="Foreground"></div>
          <div class="swatch-label">FG</div>
        </div>
        <button class="color-swap-btn" onclick="swapColors()" title="Swap">⇌</button>
        <div class="swatch-wrap">
          <div class="color-swatch" id="bg-swatch" onclick="openColorPicker('bg')" title="Background"></div>
          <div class="swatch-label">BG</div>
        </div>
      </div>
      <div class="hex-input-row">
        <span style="font-size:10px;color:var(--text-dim)">#</span>
        <input class="hex-input" id="hex-input" maxlength="6" value="000000"
          onchange="setColorFromHex(this.value)" oninput="liveHexPreview(this.value)">
        <input type="color" id="color-picker-native"
          style="width:28px;height:28px;padding:0;border:none;background:none;cursor:pointer;border-radius:4px;"
          onchange="setFromNativePicker(this.value)">
      </div>
    </div>

    <!-- Brush -->
    <div class="panel-section">
      <div class="panel-title">Brush</div>
      <div class="brush-row">
        <label>Size</label>
        <input type="range" class="brush-slider" id="brush-size" min="1" max="16" value="1"
          oninput="brushSize=+this.value; document.getElementById('brush-size-val').textContent=this.value">
        <span class="brush-val" id="brush-size-val">1</span>
      </div>
      <div class="brush-row">
        <label>Opacity</label>
        <input type="range" id="opacity-slider" min="1" max="100" value="100"
          oninput="brushOpacity=+this.value/100; document.getElementById('opacity-val').textContent=this.value+'%'">
        <span class="brush-val" id="opacity-val">100%</span>
      </div>
    </div>

    <!-- Palette -->
    <div class="panel-section">
      <div class="panel-title">Palette</div>
      <div class="palette-grid" id="palette-grid"></div>
      <div class="palette-actions">
        <button class="pal-action-btn" onclick="addColorToPalette()">+ Add</button>
        <button class="pal-action-btn" onclick="removeSelectedPaletteColor()">− Del</button>
        <button class="pal-action-btn" onclick="clearPalette()">Clear</button>
      </div>
      <div class="palette-presets">
        <select class="preset-select" onchange="loadPreset(this.value); this.value=''">
          <option value="">Load preset palette…</option>
          <option value="garden_project">🌿 Garden Project (10)</option>
          <option value="gameboy">Game Boy (4)</option>
          <option value="nes">NES (16)</option>
          <option value="pico8">PICO-8 (16)</option>
          <option value="endesga32">ENDESGA 32</option>
          <option value="apollo">Apollo (42)</option>
        </select>
      </div>
      <div style="margin-top:8px">
        <button class="pal-action-btn" onclick="openPaletteImport()" style="width:100%">Import hex list…</button>
      </div>
    </div>

    <!-- Layers -->
    <div class="panel-section">
      <div class="panel-title">Layers</div>
      <div class="layers-list" id="layers-list"></div>
      <div class="layer-actions">
        <button class="layer-action-btn" onclick="addLayer()">+ Layer</button>
        <button class="layer-action-btn" onclick="duplicateLayer()">Dupe</button>
        <button class="layer-action-btn" onclick="deleteLayer()">Delete</button>
        <button class="layer-action-btn" onclick="mergeDown()">Merge↓</button>
      </div>
    </div>

    <!-- Reference -->
    <div class="panel-section">
      <div class="panel-title">Reference Image</div>
      <div class="ref-controls">
        <button class="io-btn" onclick="triggerImportRef()">📂 Load reference</button>
        <div class="brush-row" style="margin-top:6px">
          <label>Opacity</label>
          <input type="range" class="brush-slider" id="ref-opacity" min="0" max="100" value="40"
            oninput="setRefOpacity(+this.value/100)">
          <span class="brush-val" id="ref-opacity-val">40%</span>
        </div>
        <button class="io-btn" onclick="clearRef()" style="margin-top:2px">✕ Remove reference</button>
      </div>
    </div>

  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span>🖱 <span id="status-pos">—</span></span>
  <span>🎨 <span id="status-color">—</span></span>
  <span>🔧 <span id="status-tool">pencil</span></span>
  <span style="margin-left:auto;font-size:9px;color:var(--text-dim)">Ctrl+Z undo · Ctrl+Y redo · [ ] brush size · G grid</span>
</div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="import-png-input" accept=".png,.jpg,.jpeg,.gif,.bmp,.webp" style="display:none" onchange="importImage(event,'pixel')">
<input type="file" id="import-svg-input" accept=".svg" style="display:none" onchange="importSVG(event)">
<input type="file" id="import-ref-input" accept="image/*" style="display:none" onchange="importRef(event)">
<input type="file" id="load-project-input" accept=".pxforge" style="display:none" onchange="loadProject(event)">

<!-- MODALS -->
<div class="modal-backdrop" id="modal-new">
  <div class="modal">
    <h2>New Canvas</h2>
    <div class="modal-row">
      <label>Width (px)</label>
      <input class="modal-input" id="new-w" type="number" value="32" min="1" max="1024">
    </div>
    <div class="modal-row">
      <label>Height (px)</label>
      <input class="modal-input" id="new-h" type="number" value="32" min="1" max="1024">
    </div>
    <div class="modal-row">
      <label>Background</label>
      <select class="modal-input" id="new-bg">
        <option value="transparent">Transparent</option>
        <option value="white">White</option>
        <option value="black">Black</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modal-new')">Cancel</button>
      <button class="modal-btn primary" onclick="createNewCanvas()">Create</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-palette-import">
  <div class="modal">
    <h2>Import Palette</h2>
    <div class="modal-row">
      <label>Hex codes (one per line, or comma-separated)</label>
      <textarea class="modal-input" id="palette-import-text" rows="8"
        placeholder="#ff0000&#10;#00ff00&#10;#0000ff&#10;or ff0000, 00ff00, 0000ff"
        style="resize:vertical;min-height:120px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modal-palette-import')">Cancel</button>
      <button class="modal-btn primary" onclick="importPaletteFromText()">Import</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-export-scale">
  <div class="modal">
    <h2>Export PNG (Scaled)</h2>
    <div class="modal-row">
      <label>Scale factor</label>
      <input class="modal-input" id="export-scale" type="number" value="4" min="1" max="32">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modal-export-scale')">Cancel</button>
      <button class="modal-btn primary" onclick="doExportPNGScaled()">Export</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxCopy()">Copy selection</div>
  <div class="ctx-item" onclick="ctxPaste()">Paste</div>
  <div class="ctx-item" onclick="ctxCut()">Cut selection</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxFill()">Fill with FG color</div>
  <div class="ctx-item" onclick="ctxClear()">Clear selection</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="selectAll()">Select All</div>
  <div class="ctx-item" onclick="deselect()">Deselect</div>
</div>

<script src="app.js"></script>
</body>
</html>
